name: Publish @mdrv/surreal-node

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no actual publishing)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  # Build SDK (dependency for Node package)
  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bun install

      - name: Build SDK
        run: bun run build:sdk

      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdk-artifacts
          retention-days: 1
          path: packages/sdk/dist/

  # Build Node package using GCC cross-compilation (no Zig) to avoid ABI issues
  build-node:
    name: Build Node - ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    needs: build-sdk
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: Linux x86_64 (gnu)
            host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            build: bun run build

          - name: Linux x86_64 (musl)
            host: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            build: bun run build --target x86_64-unknown-linux-musl
            use_docker: true

          - name: Linux aarch64 (gnu)
            host: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            build: bun run build --target aarch64-unknown-linux-gnu

          - name: Linux aarch64 (musl)
            host: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            build: bun run build --target aarch64-unknown-linux-musl
            use_docker: true

          - name: macOS x86_64
            host: macos-latest
            target: x86_64-apple-darwin
            build: bun run build --target x86_64-apple-darwin

          - name: macOS aarch64
            host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build --target aarch64-apple-darwin

          - name: Windows x86_64
            host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bun run build --target x86_64-pc-windows-msvc
            msvc_arch: amd64

          - name: Windows aarch64
            host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bun run build --target aarch64-pc-windows-msvc
            msvc_arch: amd64_arm64
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install GCC cross-compilation toolchain (aarch64 gnu)
        if: ${{ matrix.settings.target == 'aarch64-unknown-linux-gnu' }}
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup MSVC (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.settings.msvc_arch }}

      - name: Fix Windows PATH (remove Git link.exe conflict)
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: echo "PATH=$(echo "$PATH" | tr ':' '\n' | grep -v -E '(Git|git)[\\/](usr|mingw)' | tr '\n' ':' | sed 's/:$//')" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install

      - name: Download SDK artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-artifacts
          path: packages/sdk/dist/

      - name: Build Node package (musl via Docker)
        if: ${{ matrix.settings.use_docker }}
        shell: bash
        run: |
          # Select the appropriate Docker image based on target
          if [ "${{ matrix.settings.target }}" = "x86_64-unknown-linux-musl" ]; then
            IMAGE="messense/rust-musl-cross:x86_64-musl"
          else
            IMAGE="messense/rust-musl-cross:aarch64-musl"
          fi
          
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$IMAGE" \
            bash -c "
              set -e
              # Install bun
              curl -fsSL https://bun.sh/install | bash
              export PATH=\"\$HOME/.bun/bin:\$PATH\"
              # Install dependencies and build
              bun install
              cd packages/node
              ${{ matrix.settings.build }}
            "

      - name: Build Node package
        if: ${{ !matrix.settings.use_docker }}
        shell: bash
        working-directory: packages/node
        run: ${{ matrix.settings.build }}
        env:
          # Linux aarch64 (gnu) cross-compilation
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # Windows aarch64 cross-compilation
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER: link.exe

      - name: Upload artifact (binary)
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          if-no-files-found: error
          path: |
            packages/node/dist/*.node

      - name: Upload artifact (dist)
        uses: actions/upload-artifact@v7
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        with:
          name: node-artifacts
          if-no-files-found: error
          path: |
            packages/node/dist/
            !packages/node/dist/*.node

  # Dry run publish to verify everything works
  dry-run-publish:
    name: Dry Run Publish
    runs-on: ubuntu-latest
    needs:
      - build-node
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bun install

      - name: Download SDK artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-artifacts
          path: packages/sdk/dist/

      - name: Download Node artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-artifacts
          path: packages/node/dist/

      - name: Download node binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: packages/node/dist/
          merge-multiple: true

      - name: Distribution summary
        run: |
          echo "::group::Node tree"
          tree packages/node -I "src-ts|src-rust|target"
          echo "::endgroup::"

      - name: Dry run publish
        run: cd packages/node && bun run deploy --dry-run

  # Actual publish (only if not dry run)
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs:
      - build-node
      - dry-run-publish
    if: ${{ github.event.inputs.dry_run != 'true' && success() }}
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bun install

      - name: Download SDK artifacts
        uses: actions/download-artifact@v8
        with:
          name: sdk-artifacts
          path: packages/sdk/dist/

      - name: Download Node artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-artifacts
          path: packages/node/dist/

      - name: Download node binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: packages/node/dist/
          merge-multiple: true

      - name: Publish
        run: cd packages/node && bun run deploy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
