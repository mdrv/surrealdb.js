name: Publish @mdrv/surreal-node

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no actual publishing)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  # Build Node package using GCC cross-compilation (no Zig) to avoid ABI issues
  build-node:
    name: Build Node - ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: Linux x86_64 (gnu)
            host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            build: bun run build:node --target x86_64-unknown-linux-gnu

          - name: Linux aarch64 (gnu)
            host: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            build: bun run build:node --target aarch64-unknown-linux-gnu
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install GCC cross-compilation toolchain
        if: ${{ matrix.settings.target == 'aarch64-unknown-linux-gnu' }}
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: bun install

      - name: Build
        shell: bash
        run: ${{ matrix.settings.build }}
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact (binary)
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          if-no-files-found: error
          path: |
            packages/node/dist/*.node

      - name: Upload artifact (dist)
        uses: actions/upload-artifact@v7
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        with:
          name: node-artifacts
          if-no-files-found: error
          path: |
            packages/node/dist/
            !packages/node/dist/*.node

  # Dry run publish to verify everything works
  dry-run-publish:
    name: Dry Run Publish
    runs-on: ubuntu-latest
    needs:
      - build-node
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bun install

      - name: Download Node artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-artifacts
          path: packages/node/dist/

      - name: Download node binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: packages/node/dist/
          merge-multiple: true

      - name: Distribution summary
        run: |
          echo "::group::Node tree"
          tree packages/node -I "src-ts|src-rust|target"
          echo "::endgroup::"

      - name: Dry run publish
        run: cd packages/node && bun run deploy --dry-run

  # Actual publish (only if not dry run)
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs:
      - build-node
      - dry-run-publish
    if: ${{ github.event.inputs.dry_run != 'true' && success() }}
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bun install

      - name: Download Node artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-artifacts
          path: packages/node/dist/

      - name: Download node binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: packages/node/dist/
          merge-multiple: true

      - name: Publish
        run: cd packages/node && bun run deploy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
