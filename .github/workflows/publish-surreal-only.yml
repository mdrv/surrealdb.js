name: Publish Surreal Only

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID that already produced build artifacts"
        required: true
        type: string
      continue:
        description: "Continue publishing even if some packages fail"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest

    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Download WASM artifacts from previous run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasm-artifacts
          path: packages/wasm/
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download Node artifacts from previous run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: node-artifacts
          path: packages/node/dist/
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download node binaries from previous run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: bindings-*
          path: packages/node/dist/
          merge-multiple: true
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Publish all packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run deploy:surreal ${{ inputs.continue == 'true' && '--continue' || '' }}
